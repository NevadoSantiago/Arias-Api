spring:
  application:
    name: arias

  profiles:
    default: dev
    # "local" se carga si existe application-local-old.yml (gitignored).
    # Usalo para credenciales que no querés commitear (R2, etc.).
    include: local

  datasource:
    # Puerto 5433 (no 5432) — evitamos conflicto con un Postgres nativo de Windows
    url: jdbc:postgresql://localhost:5433/arias
    username: arias
    password: arias_dev_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false      # buena práctica: evita N+1 inadvertidos en la capa de vista
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: America/Argentina/Buenos_Aires
    show-sql: false
    hibernate:
      ddl-auto: validate     # NUNCA generamos schema desde JPA — solo Flyway

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    com.arias: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# ───────────────────────────────────────────────────────────────────────
# Configuración propia de Arias (luego se mapea a una @ConfigurationProperties)
# ───────────────────────────────────────────────────────────────────────
arias:
  jwt:
    # Secret de DEMO — en producción se sobreescribe vía variable de entorno
    secret: ${JWT_SECRET:dev-only-secret-NEVER-use-in-prod-32-chars-min-required}
    access-token-ttl: PT15M    # 15 minutos
    refresh-token-ttl: P7D     # 7 días
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://192.168.1.10:5173}
  cookie:
    # En DEV (http://localhost) → Secure=false, SameSite=Lax permite el flow front↔back
    # En PROD (https://app.arias.com ↔ api.arias.com) → Secure=true, SameSite=Strict
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
  # Bootstrap del primer SUPER_ADMIN (solo se crea si NO existe ninguno)
  bootstrap:
    admin:
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@arias.com}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:admin123}
      first-name: ${BOOTSTRAP_ADMIN_FIRST_NAME:Admin}
      last-name: ${BOOTSTRAP_ADMIN_LAST_NAME:Arias}

  # Email vía Resend (https://resend.com)
  # Si api-key está vacío, los emails se loguean pero no se envían.
  email:
    api-key: ${RESEND_API_KEY:}
    from: ${EMAIL_FROM:onboarding@resend.dev}
    from-name: ${EMAIL_FROM_NAME:Arias}
    # URL base de la app del empleado, usado en los CTAs de los emails
    app-url: ${APP_URL:http://localhost:5173}

  # Cloudflare R2 — storage de imágenes (fotos de platos)
  # Los valores reales viven en application-local-old.yml (gitignored) o env vars.
  # Si están vacíos, el endpoint de upload responde 503 con un error claro.
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:arias-dishes}
    public-url: ${R2_PUBLIC_URL:}
    # Tiempo de validez de las URLs firmadas. 5 min alcanza para subir una foto.
    presign-ttl: PT5M

---
# ──────────────────────── Perfil DEV ────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
# ──────────────────────── Perfil PROD ────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.arias: INFO
